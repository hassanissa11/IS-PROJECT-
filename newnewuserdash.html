<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Diet Planner · UI</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #1e1e2f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 32px 16px;
    }

    .app-card {
      max-width: 880px;
      width: 100%;
      min-height: calc(100vh - 64px);
      background: #0f0f1a;
      border-radius: 44px;
      padding: 48px 56px 56px;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    /* header: Diet Planner only (Premium removed) */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 44px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo i {
      font-size: 32px;
      color: #fbbf24;
      filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0.3));
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #ffffff;
      background: linear-gradient(135deg, #f9f9ff 0%, #c8c8e6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* profile row (My profile + avatar) */
    .profile-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
      background: rgba(255, 255, 255, 0.02);
      padding: 12px 16px 12px 22px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }

    .profile-row:hover {
      background: rgba(255, 255, 255, 0.045);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .profile-row:active {
      transform: scale(0.99);
      background: rgba(255, 255, 255, 0.06);
    }

    .profile-label {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .profile-label i {
      font-size: 22px;
      color: #a5a5c0;
      opacity: 0.7;
    }

    .profile-label span {
      font-size: 19px;
      font-weight: 500;
      color: #e2e2f0;
      letter-spacing: -0.2px;
    }

    .avatar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .avatar:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.45);
    }

    .avatar:active {
      transform: translateY(0) scale(0.95);
      box-shadow: 0 3px 8px rgba(79, 70, 229, 0.35);
    }

    .avatar i {
      font-size: 22px;
      color: white;
    }

    /* menu grid */
    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: auto;
      padding-bottom: 40px;
    }

    .menu-item {
      flex: 1 1 160px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(2px);
      padding: 28px 8px 22px;
      border-radius: 28px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.02);
      transition: all 0.15s ease;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      cursor: pointer;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.08);
      transform: translateY(-3px);
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
    }

    .menu-item:hover i {
      color: #e2e2f5;
      opacity: 1;
    }

    .menu-item:active {
      transform: translateY(0) scale(0.97);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
      background: rgba(255, 255, 255, 0.07);
    }

    .menu-item i {
      font-size: 32px;
      color: #c4c4e0;
      margin-bottom: 10px;
      display: block;
      opacity: 0.8;
      transition: 0.2s;
    }

    .menu-item span {
      font-size: 14px;
      font-weight: 500;
      color: #b0b0cc;
      letter-spacing: 0.2px;
      display: block;
      line-height: 1.3;
    }

    .menu-item.active {
      background: rgba(251, 191, 36, 0.06);
      border-color: rgba(251, 191, 36, 0.15);
    }

    .menu-item.active i {
      color: #fbbf24;
      opacity: 1;
      text-shadow: 0 0 12px rgba(251, 191, 36, 0.3);
    }

    .menu-item.active span {
      color: #fcd34d;
    }

    .menu-item.active:hover {
      background: rgba(251, 191, 36, 0.1);
      border-color: rgba(251, 191, 36, 0.25);
    }

    /* footer: sign-out button */
    .signout-btn {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      background: rgba(248, 113, 113, 0.08);
      padding: 18px 18px;
      border-radius: 60px;
      border: 1px solid rgba(248, 113, 113, 0.18);
      backdrop-filter: blur(2px);
      font-size: 16px;
      font-weight: 600;
      color: #fca5a5;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .signout-btn i {
      font-size: 15px;
      color: #f87171;
      transition: transform 0.15s ease;
    }

    .signout-btn:hover {
      background: rgba(248, 113, 113, 0.14);
      border-color: rgba(248, 113, 113, 0.3);
      color: #fecaca;
    }

    .signout-btn:hover i {
      transform: translateX(3px);
    }

    .signout-btn:active {
      transform: scale(0.98);
      background: rgba(248, 113, 113, 0.2);
    }

    .signout-btn:focus-visible {
      outline: 2px solid #f87171;
      outline-offset: 3px;
    }

    .menu-item:focus-visible,
    .avatar:focus-visible,
    .profile-row:focus-visible {
      outline: 2px solid #fbbf24;
      outline-offset: 3px;
    }

    /* responsive fine-tune */
    @media (max-width: 640px) {
      .app-card {
        padding: 32px 20px 32px;
        border-radius: 36px;
      }
      .logo i, .logo h1 {
        font-size: 24px;
      }
      .menu-item {
        flex: 1 1 45%;
        padding: 20px 4px 16px;
      }
      .menu-item i {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app-card">
    <!-- header: Diet Planner (Premium badge removed) -->
    <div class="header">
      <div class="logo">
        <i class="fas fa-utensils"></i>
        <h1>Diet Planner</h1>
      </div>
      <!-- premium badge removed -->
    </div>

    <!-- My profile row -->
    <div class="profile-row" tabindex="0" role="button">
      <div class="profile-label">
        <i class="fas fa-user-circle"></i>
        <span>My profile</span>
      </div>
      <div class="avatar-group">
        <div class="avatar" tabindex="0" role="button">
          <i class="fas fa-user"></i>
        </div>
      </div>
    </div>

    <!-- Meal plans + Food browser + Track progress + Forum (replaced Notes) + Settings -->
    <div class="menu-grid">
      <div class="menu-item active" tabindex="0" role="button">
        <i class="fas fa-calendar-check"></i>
        <span>Meal plans</span>
      </div>
      <div class="menu-item" tabindex="0" role="button">
        <i class="fas fa-search"></i>
        <span>Food browser</span>
      </div>
      <div class="menu-item" tabindex="0" role="button">
        <i class="fas fa-chart-line"></i>
        <span>Track progress</span>
      </div>
      <!-- Notes replaced with Forum -->
      <div class="menu-item" tabindex="0" role="button">
        <i class="fas fa-comments"></i>
        <span>Forum</span>
      </div>
      <div class="menu-item" tabindex="0" role="button">
        <i class="fas fa-gear"></i>
        <span>Settings</span>
      </div>
    </div>

    <!-- Footer: Sign out -->
    <button class="signout-btn" type="button">
      <i class="fas fa-arrow-right-from-bracket"></i>
      <span>Sign out</span>
    </button>

  </div>
</body>
</html>
